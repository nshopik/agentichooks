<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Claude Notify — Flash</title>
  <script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
</head>
<body>
  <sdpi-item label="Event type">
    <sdpi-select setting="eventType" default="stop">
      <option value="stop">Stop (turn ended)</option>
      <option value="permission">Permission request</option>
      <option value="task-completed">Task completed</option>
    </sdpi-select>
  </sdpi-item>

  <sdpi-item>
    <code id="trigger-cmd" style="font-size:11px;user-select:all;display:block;padding:4px 0;">curl -X POST http://localhost:9123/event/stop</code>
  </sdpi-item>

  <sdpi-item label="Flash mode">
    <sdpi-radio setting="flashMode" default="static">
      <option value="static">Static</option>
      <option value="pulse">Pulse</option>
    </sdpi-radio>
  </sdpi-item>

  <sdpi-item label="Pulse rate (ms)" id="pulse-rate-row">
    <sdpi-range setting="pulseIntervalMs" min="100" max="2000" step="50" default="500" showlabels></sdpi-range>
  </sdpi-item>

  <sdpi-item label="Auto-dismiss (sec)">
    <sdpi-textfield setting="autoTimeoutSeconds" placeholder="0 = never" default="0" pattern="[0-9]+"></sdpi-textfield>
  </sdpi-item>

  <sdpi-item>
    <sdpi-button onclick="testFlash()">Test flash</sdpi-button>
  </sdpi-item>

  <div id="audio-stop-section">
    <sdpi-item label="Sound (WAV)">
      <sdpi-file setting="audio.stop.soundPath" accept="audio/wav,.wav" default="C:\Windows\Media\Speech On.wav" global></sdpi-file>
    </sdpi-item>
    <sdpi-item>
      <sdpi-button onclick="muteAudio('stop')">Mute</sdpi-button>
      <sdpi-button onclick="resetAudio('stop')">Reset to default</sdpi-button>
    </sdpi-item>
    <sdpi-item label="Alert delay (sec)">
      <sdpi-textfield setting="alertDelay.stop.seconds" placeholder="1" default="1" pattern="[0-9]+(\.[0-9]+)?" global></sdpi-textfield>
    </sdpi-item>
    <sdpi-item><sdpi-button onclick="testAudio('stop')">▶ Test sound</sdpi-button></sdpi-item>
  </div>

  <div id="audio-permission-section">
    <sdpi-item label="Sound (WAV)">
      <sdpi-file setting="audio.permission.soundPath" accept="audio/wav,.wav" default="C:\Windows\Media\Windows Message Nudge.wav" global></sdpi-file>
    </sdpi-item>
    <sdpi-item>
      <sdpi-button onclick="muteAudio('permission')">Mute</sdpi-button>
      <sdpi-button onclick="resetAudio('permission')">Reset to default</sdpi-button>
    </sdpi-item>
    <sdpi-item label="Alert delay (sec)">
      <sdpi-textfield setting="alertDelay.permission.seconds" placeholder="1" default="1" pattern="[0-9]+(\.[0-9]+)?" global></sdpi-textfield>
    </sdpi-item>
    <sdpi-item><sdpi-button onclick="testAudio('permission')">▶ Test sound</sdpi-button></sdpi-item>
  </div>

  <div id="audio-task-completed-section">
    <sdpi-item label="Sound (WAV)">
      <sdpi-file setting="audio.task-completed.soundPath" accept="audio/wav,.wav" global></sdpi-file>
    </sdpi-item>
    <sdpi-item>
      <sdpi-button onclick="muteAudio('task-completed')">Mute</sdpi-button>
      <sdpi-button onclick="resetAudio('task-completed')">Reset to default</sdpi-button>
    </sdpi-item>
    <sdpi-item label="Alert delay (sec)">
      <sdpi-textfield setting="alertDelay.task-completed.seconds" placeholder="1" default="1" pattern="[0-9]+(\.[0-9]+)?" global></sdpi-textfield>
    </sdpi-item>
    <sdpi-item><sdpi-button onclick="testAudio('task-completed')">▶ Test sound</sdpi-button></sdpi-item>
  </div>

  <script>
    const ROUTE_BY_EVENT = {
      stop: "stop",
      permission: "permission-request",
      "task-completed": "task-completed",
    };

    function testFlash() {
      const client = window.SDPIComponents && window.SDPIComponents.streamDeckClient;
      if (!client) return;
      client.send("sendToPlugin", { kind: "test-flash" });
    }

    function testAudio(event) {
      const client = window.SDPIComponents && window.SDPIComponents.streamDeckClient;
      if (!client) return;
      client.send("sendToPlugin", { kind: "test-audio", event: event });
    }

    function muteAudio(event) {
      const el = document.querySelector('sdpi-file[setting="audio.' + event + '.soundPath"]');
      if (el) el.value = "";
    }

    function resetAudio(event) {
      const el = document.querySelector('sdpi-file[setting="audio.' + event + '.soundPath"]');
      if (el) el.value = undefined;
    }

    const updatePulseVisibility = () => {
      const row = document.getElementById("pulse-rate-row");
      const radio = document.querySelector('sdpi-radio[setting="flashMode"]');
      const mode = radio && radio.value;
      if (row) row.style.display = mode === "pulse" ? "" : "none";
    };
    const updateTriggerCommand = () => {
      const select = document.querySelector('sdpi-select[setting="eventType"]');
      const event = (select && select.value) || "stop";
      const cmd = document.getElementById("trigger-cmd");
      if (cmd) cmd.textContent = "curl -X POST http://localhost:9123/event/" + (ROUTE_BY_EVENT[event] || "stop");
    };
    const updateAudioVisibility = () => {
      const select = document.querySelector('sdpi-select[setting="eventType"]');
      const event = (select && select.value) || "stop";
      for (const ev of ["stop", "permission", "task-completed"]) {
        const section = document.getElementById("audio-" + ev + "-section");
        if (section) section.style.display = ev === event ? "" : "none";
      }
    };
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(updatePulseVisibility, 100);
      setTimeout(updateAudioVisibility, 100);
      setTimeout(updateTriggerCommand, 100);
      const radio = document.querySelector('sdpi-radio[setting="flashMode"]');
      if (radio) radio.addEventListener("valuechange", updatePulseVisibility);
      const eventSelect = document.querySelector('sdpi-select[setting="eventType"]');
      if (eventSelect) {
        eventSelect.addEventListener("valuechange", updateAudioVisibility);
        eventSelect.addEventListener("valuechange", updateTriggerCommand);
      }
    });
  </script>
</body>
</html>

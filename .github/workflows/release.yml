name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check-version
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run pack
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            com.nshopik.agentichooks.streamDeckPlugin
            install-hooks.ps1
            install-hooks.sh
          generate_release_notes: true
          # Auto-detect pre-release from tag suffix: v1.0.0-beta1 → prerelease,
          # v0.9.1 / v1.0.0 → normal release.
          prerelease: ${{ contains(github.ref_name, '-') }}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Agentic Hooks — Trigger Hook</title>
  <script src="sdpi-components.js"></script>
</head>
<body>
  <sdpi-item label="Route">
    <sdpi-select setting="route" default="/event/stop">
      <option value="/event/stop">/event/stop</option>
      <option value="/event/stop-failure">/event/stop-failure</option>
      <option value="/event/permission-request">/event/permission-request</option>
      <option value="/event/task-completed">/event/task-completed</option>
      <option value="/event/task-created">/event/task-created</option>
      <option value="/event/session-start">/event/session-start</option>
      <option value="/event/session-end">/event/session-end</option>
      <option value="/event/user-prompt-submit">/event/user-prompt-submit</option>
      <option value="/event/permission-denied">/event/permission-denied</option>
      <option value="/event/post-tool-use">/event/post-tool-use</option>
      <option value="/event/post-tool-use-failure">/event/post-tool-use-failure</option>
      <option value="/event/pre-tool-use">/event/pre-tool-use</option>
    </sdpi-select>
  </sdpi-item>
</body>
</html>
